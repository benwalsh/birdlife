name: Deploy to ECS Express

# Build the image on a native x86 runner (no local QEMU, no shell-var mis-tagging)
# and roll the ECS Express service onto it. Auth is OIDC — no stored AWS keys.
# The role + permissions are defined in infra/github_oidc.tf.

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time — a second push to main waits rather than racing two
# rollouts of the same service.
concurrency:
  group: deploy-ecs-express
  cancel-in-progress: false

permissions:
  id-token: write # mint the OIDC token
  contents: read

env:
  AWS_REGION: eu-west-1
  DEPLOY_ROLE: arn:aws:iam::563332535280:role/culfinbirds-github-deploy
  ECR_REPO: 563332535280.dkr.ecr.eu-west-1.amazonaws.com/culfinbirds
  ECS_CLUSTER: culfinbirds
  ECS_SERVICE: culfinbirds # verified: arn .../service/culfinbirds/culfinbirds, controller ECS

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: . # repo root — the Dockerfile needs collage/, avian/, model/
          platforms: linux/amd64 # ECS Express runs x86_64
          push: true
          tags: |
            ${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REPO }}:${{ github.sha }}

      # Roll the ECS Express service onto the freshly-pushed :latest.
      #
      # We force a new deployment rather than re-declaring the service. Terraform
      # (infra/ecs.tf) stays the single owner of the service SHAPE — image tag (:latest),
      # env, SSM secrets, roles, SG, autoscaling; CI only triggers a re-pull of that
      # same tag. This is why we do NOT use aws-actions/amazon-ecs-deploy-express-service:
      # that action is create-OR-update and RE-DECLARES the whole service from its
      # inputs, which would wipe the Bedrock/ALERTS env, the secrets, the SG and the
      # scaling that live in Terraform. --force-new-deployment can't clobber config —
      # it only re-pulls and rolls, or errors.
      #
      # NB the old "just terraform apply" path did NOT actually roll a rebuilt image:
      # with the tag pinned to :latest, an apply with no other diff is a no-op and the
      # running tasks keep the old layers. Forcing the deployment here is what makes
      # push-to-main genuinely ship.
      #
      # The service name is stable — it's the Terraform module name (infra/ecs.tf),
      # verified live as service/culfinbirds/culfinbirds with the standard ECS
      # deployment controller. If it's ever renamed in Terraform, update ECS_SERVICE
      # here to match.
      - name: Roll ECS Express onto the new image
        run: |
          set -euo pipefail
          echo "Rolling $ECS_SERVICE onto ${ECR_REPO}:${GITHUB_SHA} (via :latest)"
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" \
            --force-new-deployment >/dev/null
          echo "Waiting for the deployment to reach steady state…"
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE"
          echo "Deployed: ${ECR_REPO}:${GITHUB_SHA}"
