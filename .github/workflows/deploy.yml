name: Deploy to ECS Express

# Build the image on a native x86 runner (no local QEMU, no shell-var mis-tagging)
# and roll the ECS Express service onto it. Auth is OIDC — no stored AWS keys.
# The role + permissions are defined in infra/github_oidc.tf.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # mint the OIDC token
  contents: read

env:
  AWS_REGION: eu-west-1
  DEPLOY_ROLE: arn:aws:iam::563332535280:role/culfinbirds-github-deploy
  ECR_REPO: 563332535280.dkr.ecr.eu-west-1.amazonaws.com/culfinbirds
  ECS_SERVICE: culfinbirds
  ECS_CLUSTER: culfinbirds

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: . # repo root — the Dockerfile needs collage/, avian/, model/
          platforms: linux/amd64 # ECS Express runs x86_64
          push: true
          tags: |
            ${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REPO }}:${{ github.sha }}

      # Roll the ECS Express service onto the new image.
      #
      # NB (deliberately NOT using aws-actions/amazon-ecs-deploy-express-service here):
      # that action is create-OR-update and RE-DECLARES the whole service from its
      # inputs (execution/infra/task roles, cpu, memory, env vars, secrets, subnets,
      # security-groups, scaling, health-check). Since our service is owned by
      # Terraform (infra/ecs.tf), calling it with a partial spec would WIPE the BEDROCK
      # /ALERTS env, the SSM secrets, the ecs_tasks SG and the autoscaling. To use it
      # we'd have to duplicate every one of those inputs here — config in two places.
      #
      # So this workflow only builds + pushes (which already kills the manual-tagging
      # gremlin). The rollout onto the new :latest is a `terraform apply` (it forces a
      # new deployment). If you later want true push-to-deploy, the clean move is to
      # take the express service OUT of Terraform and let the action own it end-to-end,
      # sourcing the role ARNs from Terraform outputs — a deliberate ownership swap.
      - name: Image pushed
        run: echo "Pushed ${{ env.ECR_REPO }}:${{ github.sha }} — run 'terraform apply' to roll it out."
