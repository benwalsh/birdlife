# Curated literary / folkloric lore per species — attributed, public-domain verse and tales
# that round off a Journal entry. The model NEVER writes these: they are quoted verbatim with
# their credit ("a reference supplies the exact, attributed text"). Keyed by scientific name.
# `kind` is 'poem' or 'tale'.
#
# This example ships ONE entry to show the format. Add your own, in your own tradition —
# whatever public-domain verse or tale belongs to the birds your station hears.

"Streptopelia decaocto":
  kind: tale
  text: >
    A maid was unhappy, as she was paid only eighteen pieces a year, and begged the gods to
    let the world know how little she was rewarded by her mistress. Thereupon Zeus turned her
    into a dove, which has called out "deca octo" — eighteen — ever since.
  attribution: A Greek tale told by Theo Stephanides in Gerald Durrell's "My Family and Other Animals"
